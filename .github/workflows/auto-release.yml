name: Auto Release

on:
  push:
    branches:
      - main

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest" ]]; then
            next="v1.0.0"
            range=""
          else
            raw="${latest#v}"
            IFS='.' read -r major minor patch <<< "$raw"
            patch=$((patch + 1))
            next="v${major}.${minor}.${patch}"
            range="${latest}..HEAD"
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "range=$range" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          if git tag -l "${{ steps.version.outputs.next }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest version
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          version="${{ steps.version.outputs.next }}"
          version="${version#v}"
          manifest="custom_components/zonnestroom/manifest.json"
          sed -i "s/\"version\": \".*\"/\"version\": \"${version}\"/" "$manifest"

      - name: Build release notes
        id: notes
        if: steps.check_tag.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          file=release_notes.md
          echo "## Changes" > "$file"
          echo >> "$file"
          if [[ -z "${{ steps.version.outputs.range }}" ]]; then
            echo "- Initial release." >> "$file"
          else
            git log --no-merges --pretty=format:'- %s (%h)' "${{ steps.version.outputs.range }}" >> "$file"
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Commit manifest version bump
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/zonnestroom/manifest.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} [skip release]"
          git push origin main

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next }}
          body_path: ${{ steps.notes.outputs.file }}
