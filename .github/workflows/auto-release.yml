name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump manifest version
        id: bump
        run: |
          set -euo pipefail

          manifest="custom_components/zonspaarpot_2_0/manifest.json"
          current="$(jq -r '.version' "$manifest")"

          IFS='.' read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          tag="v${next}"

          jq --arg version "$next" '.version = $version' "$manifest" > "${manifest}.tmp"
          mv "${manifest}.tmp" "$manifest"

          echo "next_version=${next}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/zonspaarpot_2_0/manifest.json
          git commit -m "chore(release): ${{ steps.bump.outputs.next_tag }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          set -euo pipefail

          git tag "${{ steps.bump.outputs.next_tag }}"
          git push origin "${{ steps.bump.outputs.next_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.next_tag }}
          generate_release_notes: true
